# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = app/database/migrations

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, space-separated, or newline-separated.
# This makes it easy for alembic to find the app code.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file as
# well as the filename.
# timezone =

# max length of characters to allow for "slug"
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported that define custom operators
# custom_compile_operators = false

# set to 'true' to include the database connection URL in the output
# show_user_connection = false

# logging configuration is defined in the sections below.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
